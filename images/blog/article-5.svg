<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#1A2410"/>
  <!-- grid -->
  <line x1="0" y1="95" x2="860" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="190" x2="860" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="285" x2="860" y2="285" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="215" y1="0" x2="215" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="645" y1="0" x2="645" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Profile card (sender) -->
  <rect x="80" y="130" width="160" height="120" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="130" cy="165" r="18" fill="rgba(255,255,255,0.12)"/>
  <rect x="157" y="155" width="65" height="8" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="157" y="170" width="50" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <!-- LinkedIn-style in badge -->
  <rect x="92" y="195" width="136" height="44" rx="6" fill="rgba(43,82,204,0.15)" stroke="rgba(43,82,204,0.3)" stroke-width="1"/>
  <text x="130" y="221" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(43,82,204,0.8)" letter-spacing="1" font-weight="600">in LINKEDIN</text>

  <!-- Message bubbles -->
  <!-- Bad message (red X) -->
  <rect x="290" y="90" width="280" height="70" rx="10" fill="rgba(249,69,46,0.08)" stroke="rgba(249,69,46,0.2)" stroke-width="1"/>
  <text x="306" y="118" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Hola, soy de [empresa] y</text>
  <text x="306" y="134" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">ofrecemos [servicio]...</text>
  <circle cx="558" cy="108" r="10" fill="rgba(249,69,46,0.2)" stroke="rgba(249,69,46,0.5)" stroke-width="1"/>
  <line x1="552" y1="102" x2="564" y2="114" stroke="#F9452E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="564" y1="102" x2="552" y2="114" stroke="#F9452E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Good message (green check) - VAPA framework -->
  <rect x="290" y="180" width="280" height="110" rx="10" fill="rgba(28,122,72,0.08)" stroke="rgba(28,122,72,0.25)" stroke-width="1.5"/>
  <text x="306" y="204" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">V — VALOR ESPECÍFICO</text>
  <rect x="306" y="210" width="240" height="6" rx="2" fill="rgba(255,255,255,0.1)"/>
  <text x="306" y="228" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">A — ÁNGULO RELEVANTE</text>
  <rect x="306" y="234" width="180" height="6" rx="2" fill="rgba(255,255,255,0.07)"/>
  <text x="306" y="252" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">P — PRUEBA</text>
  <rect x="306" y="258" width="200" height="6" rx="2" fill="rgba(255,255,255,0.07)"/>
  <text x="306" y="276" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">A — ACCIÓN MÍNIMA</text>

  <!-- Reply bubble -->
  <rect x="490" y="310" width="140" height="44" rx="10" fill="rgba(28,122,72,0.15)" stroke="rgba(28,122,72,0.35)" stroke-width="1"/>
  <text x="560" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(28,122,72,0.9)">¡Claro, con</text>
  <text x="560" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(28,122,72,0.9)">gusto!</text>

  <!-- Response rate stat -->
  <rect x="640" y="100" width="140" height="60" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="710" y="126" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#F9452E" font-weight="700">90%</text>
  <text x="710" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="1">IGNORADOS</text>

  <text x="48" y="56" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">VENTAS B2B</text>
  <text x="48" y="345" font-family="sans-serif" font-size="62" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">OUTREACH</text>
</svg>
