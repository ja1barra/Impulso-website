<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#24151A"/>
  <!-- grid -->
  <line x1="0" y1="95" x2="860" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="190" x2="860" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="285" x2="860" y2="285" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="215" y1="0" x2="215" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="645" y1="0" x2="645" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Central founder figure -->
  <circle cx="430" cy="160" r="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="430" y="168" text-anchor="middle" font-family="sans-serif" font-size="20">👤</text>
  <!-- Body -->
  <rect x="414" y="188" width="32" height="50" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Arms going to different roles -->
  <!-- CEO role (top left) -->
  <line x1="414" y1="200" x2="300" y2="130" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="210" y="100" width="80" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="250" y="121" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">CEO</text>

  <!-- CTO role (top right) -->
  <line x1="446" y1="200" x2="560" y2="130" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="570" y="100" width="80" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="610" y="121" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">CTO</text>

  <!-- Vendedor role (left) -->
  <line x1="414" y1="215" x2="260" y2="210" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="160" y="196" width="90" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="205" y="217" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">VENTAS</text>

  <!-- Soporte role (right) -->
  <line x1="446" y1="215" x2="600" y2="210" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="610" y="196" width="90" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="655" y="217" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">SOPORTE</text>

  <!-- Diseño role (bottom left) -->
  <line x1="420" y1="238" x2="300" y2="290" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="210" y="274" width="90" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="255" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">DISEÑO</text>

  <!-- Finanzas role (bottom right) -->
  <line x1="440" y1="238" x2="560" y2="290" stroke="rgba(249,69,46,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="560" y="274" width="90" height="36" rx="6" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="605" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(249,69,46,0.8)" letter-spacing="1" font-weight="600">FINANZAS</text>

  <!-- Bottleneck label -->
  <text x="430" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.5)" letter-spacing="2">⚠ CUELLO DE BOTELLA</text>

  <text x="48" y="56" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">MINDSET</text>
  <text x="48" y="345" font-family="sans-serif" font-size="62" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">TODÓLOGO</text>
</svg>
