<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#2A1510"/>
  <!-- grid -->
  <line x1="80" y1="60" x2="80" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="310" x2="800" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- horizontal grid -->
  <line x1="80" y1="260" x2="800" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="210" x2="800" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="160" x2="800" y2="160" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="110" x2="800" y2="110" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Chaotic revenue (month 1-4) - jagged spiky line -->
  <polyline points="80,200 170,130 260,280 350,150 440,250"
    stroke="rgba(249,69,46,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- Predictable revenue line (starting after a system is built) - smooth steady growth -->
  <polyline points="440,250 530,210 620,175 710,140 800,105"
    stroke="#F9452E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area fill -->
  <path d="M440,250 L530,210 L620,175 L710,140 L800,105 L800,310 L440,310 Z"
    fill="url(#revGrad)"/>
  <defs>
    <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9452E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F9452E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Inflection point marker -->
  <circle cx="440" cy="250" r="8" fill="rgba(249,69,46,0.2)" stroke="#F9452E" stroke-width="1.5"/>
  <circle cx="440" cy="250" r="3" fill="#F9452E"/>
  <!-- Label -->
  <line x1="440" y1="242" x2="440" y2="200" stroke="rgba(249,69,46,0.4)" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="386" y="178" width="108" height="22" rx="4" fill="rgba(249,69,46,0.15)" stroke="rgba(249,69,46,0.3)" stroke-width="1"/>
  <text x="440" y="193" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.85)" letter-spacing="1">SISTEMA ACTIVADO</text>

  <!-- Month labels -->
  <text x="125" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">ENE</text>
  <text x="215" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">FEB</text>
  <text x="305" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">MAR</text>
  <text x="395" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">ABR</text>
  <text x="485" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">MAY</text>
  <text x="575" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">JUN</text>
  <text x="665" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">JUL</text>
  <text x="755" y="328" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">AGO</text>

  <!-- Y axis labels -->
  <text x="65" y="264" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">25k</text>
  <text x="65" y="214" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">50k</text>
  <text x="65" y="164" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">75k</text>
  <text x="65" y="114" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">100k</text>

  <!-- Forecast badge -->
  <rect x="620" y="68" width="160" height="70" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="700" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">FORECAST</text>
  <text x="700" y="115" text-anchor="middle" font-family="sans-serif" font-size="26" fill="white" font-weight="700">$25k</text>
  <text x="700" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(28,122,72,0.7)" letter-spacing="1">↑ PREDECIBLE</text>

  <!-- Labels -->
  <text x="250" y="75" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.35)" letter-spacing="1">CAOS</text>
  <text x="560" y="75" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.7)" letter-spacing="1">SISTEMA</text>

  <text x="48" y="50" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">MINDSET</text>
  <text x="48" y="370" font-family="sans-serif" font-size="40" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">REVENUE PREDECIBLE</text>
</svg>
