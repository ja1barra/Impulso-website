<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#1E1C22"/>
  <!-- grid lines -->
  <line x1="0" y1="95" x2="860" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="190" x2="860" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="285" x2="860" y2="285" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="215" y1="0" x2="215" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="645" y1="0" x2="645" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Funnel shape -->
  <path d="M180 80 L680 80 L560 200 L560 310 L300 310 L300 200 Z" fill="rgba(249,69,46,0.08)" stroke="rgba(249,69,46,0.25)" stroke-width="1.5"/>

  <!-- Funnel sections -->
  <rect x="180" y="80" width="500" height="50" rx="4" fill="rgba(249,69,46,0.12)" stroke="rgba(249,69,46,0.3)" stroke-width="1"/>
  <rect x="240" y="148" width="380" height="40" rx="4" fill="rgba(249,69,46,0.09)" stroke="rgba(249,69,46,0.22)" stroke-width="1"/>
  <rect x="300" y="205" width="260" height="38" rx="4" fill="rgba(249,69,46,0.06)" stroke="rgba(249,69,46,0.18)" stroke-width="1"/>

  <!-- Labels inside funnel -->
  <text x="430" y="112" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="1">LEADS</text>
  <text x="430" y="174" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" letter-spacing="1">CALIFICADOS</text>
  <text x="430" y="231" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">PROPUESTAS</text>

  <!-- X mark (blocked at bottom) -->
  <circle cx="430" cy="316" r="24" fill="rgba(249,69,46,0.15)" stroke="#F9452E" stroke-width="1.5"/>
  <line x1="419" y1="305" x2="441" y2="327" stroke="#F9452E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="441" y1="305" x2="419" y2="327" stroke="#F9452E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dollar signs falling out left -->
  <text x="120" y="260" font-family="sans-serif" font-size="22" fill="rgba(249,69,46,0.3)" transform="rotate(-20,120,260)">$</text>
  <text x="95" y="300" font-family="sans-serif" font-size="16" fill="rgba(249,69,46,0.2)" transform="rotate(-25,95,300)">$</text>
  <text x="140" y="310" font-family="sans-serif" font-size="12" fill="rgba(249,69,46,0.15)" transform="rotate(-15,140,310)">$</text>
  <!-- Dollar signs falling out right -->
  <text x="720" y="255" font-family="sans-serif" font-size="22" fill="rgba(249,69,46,0.3)" transform="rotate(20,720,255)">$</text>
  <text x="745" y="295" font-family="sans-serif" font-size="16" fill="rgba(249,69,46,0.2)" transform="rotate(25,745,295)">$</text>
  <text x="705" y="310" font-family="sans-serif" font-size="12" fill="rgba(249,69,46,0.15)" transform="rotate(15,705,310)">$</text>

  <!-- Label top left -->
  <text x="48" y="56" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">VENTAS B2B</text>
  <!-- Big text -->
  <text x="48" y="345" font-family="sans-serif" font-size="62" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">PIPELINE</text>
</svg>
