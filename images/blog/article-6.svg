<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#251E0E"/>
  <!-- grid -->
  <line x1="0" y1="95" x2="860" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="190" x2="860" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="285" x2="860" y2="285" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Balance scale -->
  <!-- Center pole -->
  <line x1="430" y1="100" x2="430" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Pivot -->
  <circle cx="430" cy="165" r="6" fill="rgba(255,255,255,0.3)"/>
  <!-- Balance beam (tilted — left side down = underpriced) -->
  <line x1="200" y1="185" x2="660" y2="145" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Left pan (underpriced - low) -->
  <path d="M150 220 Q200 240 250 220" stroke="rgba(249,69,46,0.6)" stroke-width="1.5" fill="rgba(249,69,46,0.08)"/>
  <line x1="200" y1="185" x2="200" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Low price tag on left -->
  <rect x="165" y="228" width="70" height="36" rx="6" fill="rgba(249,69,46,0.15)" stroke="rgba(249,69,46,0.4)" stroke-width="1"/>
  <text x="200" y="247" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#F9452E" font-weight="700">$199</text>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(249,69,46,0.6)" letter-spacing="1">MUY BAJO</text>
  <!-- X under left -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(249,69,46,0.5)">✗</text>

  <!-- Right pan (correct price - high) -->
  <path d="M610 180 Q660 200 710 180" stroke="rgba(28,122,72,0.6)" stroke-width="1.5" fill="rgba(28,122,72,0.08)"/>
  <line x1="660" y1="145" x2="660" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Right price tag -->
  <rect x="625" y="188" width="70" height="36" rx="6" fill="rgba(28,122,72,0.15)" stroke="rgba(28,122,72,0.4)" stroke-width="1"/>
  <text x="660" y="207" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(28,122,72,0.9)" font-weight="700">$799</text>
  <text x="660" y="220" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(28,122,72,0.6)" letter-spacing="1">CALIBRADO</text>
  <!-- Check under right -->
  <text x="660" y="248" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(28,122,72,0.7)">✓</text>

  <!-- Pricing models -->
  <rect x="80" y="70" width="100" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="91" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1">POR SEAT</text>

  <rect x="80" y="112" width="100" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1">USAGE-BASED</text>

  <rect x="80" y="154" width="100" height="32" rx="6" fill="rgba(249,69,46,0.08)" stroke="rgba(249,69,46,0.25)" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.7)" letter-spacing="1">VALUE-BASED</text>

  <!-- Dollar signs floating -->
  <text x="330" y="110" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.06)" font-weight="900">$</text>
  <text x="500" y="90" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.04)" font-weight="900">$</text>
  <text x="770" y="130" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.05)" font-weight="900">$</text>

  <text x="48" y="56" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">GO-TO-MARKET</text>
  <text x="200" y="345" font-family="sans-serif" font-size="62" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">PRICING</text>
</svg>
