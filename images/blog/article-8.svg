<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#132030"/>
  <!-- grid -->
  <line x1="0" y1="95" x2="860" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="285" x2="860" y2="285" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="380" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Document 1 -->
  <rect x="100" y="70" width="200" height="250" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Dog-ear -->
  <path d="M270 70 L300 100 L270 100 Z" fill="rgba(255,255,255,0.05)"/>
  <!-- Doc header -->
  <rect x="118" y="90" width="140" height="12" rx="3" fill="rgba(249,69,46,0.4)"/>
  <text x="188" y="101" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.9)" letter-spacing="1" font-weight="600">SOP 01 — VENTAS</text>
  <!-- Steps -->
  <circle cx="130" cy="124" r="7" fill="rgba(249,69,46,0.2)" stroke="rgba(249,69,46,0.4)" stroke-width="1"/>
  <text x="130" y="128" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F9452E" font-weight="700">1</text>
  <rect x="146" y="119" width="130" height="7" rx="2" fill="rgba(255,255,255,0.12)"/>

  <circle cx="130" cy="152" r="7" fill="rgba(249,69,46,0.2)" stroke="rgba(249,69,46,0.4)" stroke-width="1"/>
  <text x="130" y="156" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F9452E" font-weight="700">2</text>
  <rect x="146" y="147" width="110" height="7" rx="2" fill="rgba(255,255,255,0.12)"/>

  <circle cx="130" cy="180" r="7" fill="rgba(249,69,46,0.2)" stroke="rgba(249,69,46,0.4)" stroke-width="1"/>
  <text x="130" y="184" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F9452E" font-weight="700">3</text>
  <rect x="146" y="175" width="125" height="7" rx="2" fill="rgba(255,255,255,0.12)"/>

  <circle cx="130" cy="208" r="7" fill="rgba(28,122,72,0.3)" stroke="rgba(28,122,72,0.5)" stroke-width="1"/>
  <text x="130" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(28,122,72,0.9)">✓</text>
  <rect x="146" y="203" width="90" height="7" rx="2" fill="rgba(28,122,72,0.2)"/>

  <rect x="118" y="240" width="160" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="118" y="254" width="130" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="118" y="268" width="140" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="118" y="282" width="100" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>

  <!-- Document 2 (overlapping) -->
  <rect x="330" y="90" width="200" height="230" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="348" y="110" width="140" height="12" rx="3" fill="rgba(43,82,204,0.3)"/>
  <text x="418" y="121" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(43,82,204,0.8)" letter-spacing="1" font-weight="600">SOP 02 — ONBOARDING</text>
  <rect x="348" y="136" width="160" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="348" y="150" width="130" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="348" y="164" width="140" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="348" y="178" width="110" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="348" y="200" width="160" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="348" y="214" width="130" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>

  <!-- Document 3 -->
  <rect x="560" y="110" width="200" height="210" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="578" y="130" width="140" height="12" rx="3" fill="rgba(130,43,168,0.25)"/>
  <text x="648" y="141" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(130,43,168,0.7)" letter-spacing="1" font-weight="600">SOP 03 — ENTREGA</text>
  <rect x="578" y="156" width="160" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="578" y="170" width="130" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="578" y="184" width="140" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="578" y="198" width="100" height="6" rx="2" fill="rgba(255,255,255,0.04)"/>

  <!-- Freedom meter -->
  <rect x="100" y="340" width="660" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="340" width="440" height="8" rx="4" fill="rgba(28,122,72,0.4)"/>
  <text x="100" y="358" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="1">CAOS</text>
  <text x="760" y="358" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(28,122,72,0.6)" letter-spacing="1">LIBERTAD OPERATIVA</text>

  <text x="48" y="56" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">OPERACIONES</text>
</svg>
