<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <rect width="860" height="380" fill="#251526"/>
  <!-- grid -->
  <line x1="80" y1="60" x2="80" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="310" x2="790" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- horizontal grid -->
  <line x1="80" y1="210" x2="790" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="160" x2="790" y2="160" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="110" x2="790" y2="110" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- MRR Growth line -->
  <polyline points="80,295 160,280 240,265 320,240 400,210 480,175 560,145 640,110 720,80 790,55"
    stroke="#F9452E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area fill under line -->
  <path d="M80,295 L160,280 L240,265 L320,240 L400,210 L480,175 L560,145 L640,110 L720,80 L790,55 L790,310 L80,310 Z"
    fill="url(#mrrGrad)"/>
  <defs>
    <linearGradient id="mrrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9452E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F9452E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Data point dots -->
  <circle cx="160" cy="280" r="4" fill="#F9452E"/>
  <circle cx="320" cy="240" r="4" fill="#F9452E"/>
  <circle cx="480" cy="175" r="4" fill="#F9452E"/>
  <circle cx="640" cy="110" r="4" fill="#F9452E"/>
  <circle cx="790" cy="55" r="5" fill="#F9452E" stroke="rgba(37,21,38,1)" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="60" y="314" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">0</text>
  <text x="60" y="214" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">25k</text>
  <text x="60" y="164" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">50k</text>
  <text x="60" y="114" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">75k</text>
  <text x="60" y="64" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">100k</text>

  <!-- MRR label -->
  <text x="92" y="52" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">MRR</text>

  <!-- Metric badges -->
  <rect x="540" y="180" width="90" height="36" rx="6" fill="rgba(249,69,46,0.15)" stroke="rgba(249,69,46,0.35)" stroke-width="1"/>
  <text x="585" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(249,69,46,0.7)" letter-spacing="1">CAC</text>
  <text x="585" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="700">$420</text>

  <rect x="540" y="226" width="90" height="36" rx="6" fill="rgba(28,122,72,0.15)" stroke="rgba(28,122,72,0.35)" stroke-width="1"/>
  <text x="585" y="242" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(28,122,72,0.7)" letter-spacing="1">LTV</text>
  <text x="585" y="256" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="700">$2,100</text>

  <rect x="648" y="180" width="90" height="36" rx="6" fill="rgba(43,82,204,0.15)" stroke="rgba(43,82,204,0.35)" stroke-width="1"/>
  <text x="693" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(43,82,204,0.7)" letter-spacing="1">CHURN</text>
  <text x="693" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="700">1.8%</text>

  <rect x="648" y="226" width="90" height="36" rx="6" fill="rgba(130,43,168,0.15)" stroke="rgba(130,43,168,0.35)" stroke-width="1"/>
  <text x="693" y="242" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(130,43,168,0.7)" letter-spacing="1">NRR</text>
  <text x="693" y="256" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="700">112%</text>

  <text x="48" y="40" font-family="sans-serif" font-size="11" fill="rgba(249,69,46,0.7)" letter-spacing="2" font-weight="600">SAAS METRICS</text>
  <text x="100" y="345" font-family="sans-serif" font-size="62" fill="rgba(255,255,255,0.04)" font-weight="900" letter-spacing="-2">MRR · ARR · LTV</text>
</svg>
